name: PeiPei
options:
  bundleIdPrefix: com.peipei
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  xcodeVersion: "16.0"
settings:
  base:
    DEVELOPMENT_TEAM: MNB3V4MHFJ
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  PeiPei:
    type: application
    platform: iOS
    sources:
      - PeiPei
    settings:
      base:
        INFOPLIST_FILE: PeiPei/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.peipei.app
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: PeiPei/Info.plist
      properties:
        CFBundleName: PeiPei
        CFBundleDisplayName: PeiPei
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSMicrophoneUsageDescription: "PeiPei needs microphone access to record voice messages for your coach."
        NSCameraUsageDescription: "PeiPei needs camera access to capture photos to share with your coach."
        NSPhotoLibraryUsageDescription: "PeiPei needs photo library access to attach images to your messages."
